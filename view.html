<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Blooming Flowers Day to Night</title>
  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(to top, #87CEEB, #FFD700);
      animation: dayNight 12s infinite alternate;
    }
    .garden {
      display: flex;
      gap: 40px;
    }
    .flower {
      width: 80px;
      height: 80px;
      background: radial-gradient(circle, pink 40%, transparent 70%);
      border-radius: 50%;
      transform: scale(0.5);
      animation: bloom 6s infinite alternate;
      position: relative;
    }
    .stem {
      width: 10px;
      height: 100px;
      background: green;
      position: absolute;
      bottom: -100px;
      left: 35px;
    }
    @keyframes bloom {
      0% { transform: scale(0.5); opacity: 0.6; }
      100% { transform: scale(1.2); opacity: 1; }
    }
    @keyframes dayNight {
      0% { background: linear-gradient(to top, #87CEEB, #FFD700); } /* Day */
      100% { background: linear-gradient(to top, #001d3d, #000000); } /* Night */
    }
  </style>
</head>
<body>
  <div class="garden">
    <div class="flower">
      <div class="stem"></div>
    </div>
    <div class="flower">
      <div class="stem"></div>
    </div>
    <div class="flower">
      <div class="stem"></div>
    </div>
  </div>
</body>
</html>
