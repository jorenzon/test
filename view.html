<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Simple Form</title>
  <!-- Bootstrap 5 CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">

  <div class="card shadow-lg p-4" style="max-width: 500px; width: 100%;">
    <h1 class="text-center mb-4">Simple Form</h1>

    <!-- Success/Error message placeholder -->
    <div id="message" class="alert alert-info d-none"></div>

    <form method="post" action="/api/submit">
      <div class="mb-3">
        <label for="name" class="form-label">Name:</label>
        <input type="text" id="name" name="name" class="form-control" required>
      </div>
      <div class="mb-3">
        <label for="email" class="form-label">Email:</label>
        <input type="email" id="email" name="email" class="form-control" required>
      </div>
      <div class="mb-3">
        <label for="question1" class="form-label">What is your favorite color?</label>
        <input type="text" id="question1" name="question1" class="form-control" required>
      </div>
      <button type="submit" class="btn btn-primary w-100">Submit</button>
    </form>

    <div class="text-center mt-3">
      <a href="view.html" class="btn btn-link">View Submitted Responses</a>
    </div>
  </div>

  <!-- Bootstrap JS (optional, for components like modals) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
